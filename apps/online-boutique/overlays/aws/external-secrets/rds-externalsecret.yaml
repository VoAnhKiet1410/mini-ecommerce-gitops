apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: rds-master
  namespace: boutique
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: rds-master
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: mini-ecommerce-devops/rds/master
